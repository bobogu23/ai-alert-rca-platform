# 测试环境配置: MySQL 与 LiteLLM 使用本地已部署实例, 其余外部依赖在测试中 mock.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/rca?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456abc}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  # 集成测试启动前初始化建表脚本; 表已存在时 continue-on-error 保证幂等
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:db/schema.sql
  http:
    client:
      connect-timeout: 3s
      read-timeout: 65s
  ai:
    # 关闭内置重试, 与生产一致: 重试/超时统一由 RetryExecutor + TimeLimiter 管控
    retry:
      max-attempts: 1
    openai:
      base-url: ${LITELLM_BASE_URL:http://127.0.0.1:4000}
      api-key: ${LITELLM_API_KEY:7d561f32a0c047b8a0041ee80cf950b1.YUx4vMquBxkEzLEU}
      chat:
        options:
          model: ${LITELLM_DEFAULT_MODEL:glm-5.2}
        observations:
          log-prompt: true
          log-completion: true

management:
  tracing:
    sampling:
      probability: 1.0
  observations:
    annotations:
      enabled: true

rca:
  concurrency:
    max-concurrent-analyses: 4
    queue-capacity: 8
  # Langfuse 接入测试用: 默认关闭, 填入下列环境变量并置 LANGFUSE_ENABLED=true 后, Trace 会真实上报
  langfuse:
    enabled: ${LANGFUSE_ENABLED:true}
    host: ${LANGFUSE_HOST:https://us.cloud.langfuse.com}
    public-key: ${LANGFUSE_PUBLIC_KEY:}
    secret-key: ${LANGFUSE_SECRET_KEY:}
